name: device_app
description: A new Flutter project.

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: '>=3.1.5 <4.0.0'


dependencies:
  flutter:
    sdk: flutter
  # Value equality for models and bloc states.
  equatable: ^2.0.5
  # State management for the BLE device list.
  flutter_bloc: ^8.1.3

  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  # Helpers for unit-testing blocs.
  bloc_test: ^9.1.4
  flutter_lints: ^2.0.0
  mocktail: ^1.0.0



flutter:
  uses-material-design: true
  # Mock BLE device data bundled with the app.
  assets:
    - assets/devices.json
